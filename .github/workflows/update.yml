name: Daily Stock Analysis

on:
  schedule:
    # Run at 21:00 UTC (After US market close) on weekdays
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # Allow manual triggers

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    # Grant permissions needed to commit back to the repo
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Analysis Script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python update_data.py
        
      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          # Only commit if data.json actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily analysis update" && git push)
